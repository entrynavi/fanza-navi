<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a0a12"/>
      <stop offset="1" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e34a6e"/>
      <stop offset="1" stop-color="#d3af6f"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Stylized magnifying glass + chart bars = "search + discover" concept -->
  <circle cx="26" cy="26" r="10" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="33" x2="42" y2="42" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <!-- Three rising bars inside lens = trending/ranking -->
  <rect x="21" y="28" width="3" height="5" rx="1" fill="#e34a6e" opacity="0.9" transform="rotate(0,22.5,30.5)"/>
  <rect x="25" y="24" width="3" height="9" rx="1" fill="#d3af6f" opacity="0.9"/>
  <rect x="29" y="20" width="3" height="13" rx="1" fill="#e34a6e" opacity="0.9"/>
  <!-- "N" letter bottom-right for "Navi" -->
  <text x="47" y="56" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="800" fill="url(#accent)">F</text>
</svg>
