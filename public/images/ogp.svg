<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#1a1520"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e34a6e"/>
      <stop offset="100%" style="stop-color:#d3af6f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d3af6f"/>
      <stop offset="100%" style="stop-color:#b8935a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="120" r="280" fill="#e34a6e" opacity="0.06"/>
  <circle cx="250" cy="480" r="220" fill="#d3af6f" opacity="0.04"/>
  <rect x="80" y="60" width="1040" height="510" rx="32" fill="none" stroke="#d3af6f" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Logo mark -->
  <circle cx="600" cy="140" r="40" fill="none" stroke="url(#brand)" stroke-width="6"/>
  <rect x="585" y="148" width="8" height="16" rx="2" fill="#e34a6e" opacity="0.9"/>
  <rect x="596" y="136" width="8" height="28" rx="2" fill="#d3af6f" opacity="0.9"/>
  <rect x="607" y="124" width="8" height="40" rx="2" fill="#e34a6e" opacity="0.9"/>
  <line x1="628" y1="168" x2="650" y2="190" stroke="url(#brand)" stroke-width="6" stroke-linecap="round"/>
  <!-- Site name -->
  <text x="600" y="260" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="72" font-weight="800" fill="url(#brand)">FANZAオトナビ</text>
  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="600" fill="#f7f3eb" opacity="0.85">セール解析 × シチュ検索 × 独自ランキング</text>
  <line x1="420" y1="355" x2="780" y2="355" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Features -->
  <text x="600" y="400" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="20" fill="#a09888">価格トラッカー・コスト比較・週間セールまとめ</text>
  <text x="600" y="435" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="20" fill="#a09888">公式FANZAにない切り口で、もっとお得に楽しく</text>
  <!-- CTA -->
  <rect x="420" y="470" width="360" height="56" rx="28" fill="url(#brand)"/>
  <text x="600" y="507" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="20" font-weight="700" fill="white">無料で使ってみる →</text>
</svg>
