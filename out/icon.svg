<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a0a12"/>
      <stop offset="1" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e34a6e"/>
      <stop offset="1" stop-color="#d3af6f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="url(#accent)" stroke-width="6" stroke-opacity="0.3"/>
  <!-- Magnifying glass with bold F inside -->
  <circle cx="216" cy="216" r="128" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round"/>
  <line x1="304" y1="304" x2="416" y2="416" stroke="url(#accent)" stroke-width="32" stroke-linecap="round"/>
  <text x="216" y="216" font-family="'Arial Black','Helvetica Neue',sans-serif" font-size="176" font-weight="900" fill="url(#accent)" text-anchor="middle" dominant-baseline="central" letter-spacing="-8">F</text>
</svg>
